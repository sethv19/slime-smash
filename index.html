  set: function(k,v){ try{ localStorage.setItem(k,JSON.stringify(v)); }catch(e){} }

function getTeam(id){ return TEAMS.find(function(t){ return t.id===id; }); }
function fml(ml){ return ml>0 ? "+"+ml : ""+ml; }
function mlPay(ml,bet){ return ml>0 ? (bet*ml/100).toFixed(2) : (bet*100/Math.abs(ml)).toFixed(2); }
function mlImp(ml){ return ml>0 ? (100/(ml+100)*100).toFixed(0) : (Math.abs(ml)/(Math.abs(ml)+100)*100).toFixed(0); }
function toDec(ml){ return ml>0 ? ml/100+1 : 100/Math.abs(ml)+1; }
function parlayOdds(legs){
  if(!legs.length) return "--";
  var d = legs.reduce(function(a,l){ return a*toDec(l.ml); }, 1);
  return d>=2 ? "+"+Math.round((d-1)*100) : "-"+Math.round(100/(d-1));
}
function parlayWin(legs,bet){
  var d = legs.reduce(function(a,l){ return a*toDec(l.ml); }, 1);
  return (bet*(d-1)).toFixed(2);
}
function calcOdds(t1id,t2id,type){
  var diff = STRENGTH[t2id]-STRENGTH[t1id];
  var ml1,ml2;
  if(diff>3){ml1=-280;ml2=230;}
  else if(diff>1.5){ml1=-175;ml2=145;}
  else if(diff>0.5){ml1=-140;ml2=118;}
  else if(diff>-0.5){ml1=-115;ml2=-105;}
  else if(diff>-1.5){ml1=118;ml2=-140;}
  else if(diff>-3){ml1=145;ml2=-175;}
  else{ml1=230;ml2=-280;}
  var rr = type==="rr";
  return {ml1:ml1, ml2:ml2, spread:rr?0.5:1.5, ou:rr?1.5:3.5, sfav:diff>=0?1:2};
}
var PP = {
  // rO/rU = reb over/under odds. Heavy over lean across the board — lots of bricks = lots of boards
  Jacob: {rr:{pts:1.5,reb:1.5,ast:1.5,pO:-150,pU:130,rO:-200,rU:165,aO:-120,aU:100},se:{pts:4.5,reb:3.5,ast:2.5,pO:-145,pU:125,rO:-210,rU:175,aO:-120,aU:100}},
  Nathan:{rr:{pts:1.5,reb:0.5,ast:1.5,pO:-135,pU:115,rO:-175,rU:145,aO:-125,aU:105},se:{pts:3.5,reb:1.5,ast:2.5,pO:-130,pU:110,rO:-185,rU:155,aO:-120,aU:100}},
  Liam:  {rr:{pts:1.5,reb:2.5,ast:0.5,pO:-130,pU:110,rO:-220,rU:180,aO:-110,aU:-110},se:{pts:3.5,reb:4.5,ast:0.5,pO:-125,pU:105,rO:-230,rU:190,aO:-110,aU:-110}},
  Ryan:  {rr:{pts:1.5,reb:0.5,ast:0.5,pO:-120,pU:100,rO:-165,rU:135,aO:-110,aU:-110},se:{pts:3.5,reb:1.5,ast:1.5,pO:-115,pU:-105,rO:-175,rU:145,aO:-110,aU:-110}},
  Adam:  {rr:{pts:1.5,reb:0.5,ast:0.5,pO:-118,pU:100,rO:-160,rU:130,aO:-110,aU:-110},se:{pts:3.5,reb:1.5,ast:0.5,pO:-115,pU:-105,rO:-170,rU:140,aO:-110,aU:-110}},
  Cam:   {rr:{pts:0.5,reb:1.5,ast:0.5,pO:-110,pU:-110,rO:-185,rU:155,aO:-110,aU:-110},se:{pts:2.5,reb:2.5,ast:1.5,pO:-110,pU:-110,rO:-195,rU:160,aO:-110,aU:-110}},
  Chappy:{rr:{pts:1.5,reb:0.5,ast:0.5,pO:-115,pU:-105,rO:-155,rU:125,aO:-110,aU:-110},se:{pts:2.5,reb:1.5,ast:0.5,pO:-112,pU:-108,rO:-165,rU:135,aO:-110,aU:-110}},
  Thomas:{rr:{pts:0.5,reb:0.5,ast:0.5,pO:-115,pU:-105,rO:-150,rU:120,aO:-110,aU:-110},se:{pts:2.5,reb:1.5,ast:0.5,pO:-110,pU:-110,rO:-160,rU:130,aO:-110,aU:-110}},
  Seth:  {rr:{pts:1.5,reb:1.5,ast:0.5,pO:-118,pU:100,rO:-190,rU:158,aO:-110,aU:-110},se:{pts:2.5,reb:2.5,ast:0.5,pO:-115,pU:-105,rO:-200,rU:165,aO:-110,aU:-110}},
  Joe:   {rr:{pts:0.5,reb:1.5,ast:0.5,pO:-110,pU:-110,rO:-180,rU:150,aO:-110,aU:-110},se:{pts:2.5,reb:2.5,ast:0.5,pO:-110,pU:-110,rO:-190,rU:158,aO:-110,aU:-110}},
  Tony:  {rr:{pts:0.5,reb:0.5,ast:0.5,pO:-110,pU:-110,rO:-145,rU:115,aO:-110,aU:-110},se:{pts:1.5,reb:0.5,ast:0.5,pO:-110,pU:-110,rO:-155,rU:125,aO:-110,aU:-110}},
  Jack:  {rr:{pts:0.5,reb:0.5,ast:0.5,pO:-110,pU:-110,rO:-145,rU:115,aO:-110,aU:-110},se:{pts:1.5,reb:1.5,ast:0.5,pO:-110,pU:-110,rO:-155,rU:125,aO:-110,aU:-110}},
  Dan:   {rr:{pts:0.5,reb:0.5,ast:0.5,pO:-110,pU:-110,rO:-145,rU:115,aO:-110,aU:-110},se:{pts:1.5,reb:0.5,ast:0.5,pO:-110,pU:-110,rO:-150,rU:120,aO:-110,aU:-110}},
  Jordan:{rr:{pts:0.5,reb:0.5,ast:0.5,pO:-110,pU:-110,rO:-140,rU:110,aO:-110,aU:-110},se:{pts:1.5,reb:0.5,ast:0.5,pO:-110,pU:-110,rO:-150,rU:120,aO:-110,aU:-110}},
  Matthew:{rr:{pts:0.5,reb:0.5,ast:0.5,pO:100,pU:-120,rO:-140,rU:110,aO:-110,aU:-110},se:{pts:1.5,reb:0.5,ast:0.5,pO:105,pU:-125,rO:-150,rU:120,aO:-110,aU:-110}}
};
function getPL(name,type){
  var p = PP[name] || PP.Jordan;
  var t = type==="rr" ? p.rr : p.se;
  return {pts:t.pts,reb:t.reb,ast:t.ast,pO:{o:t.pO,u:t.pU},rO:{o:t.rO,u:t.rU},aO:{o:t.aO,u:t.aU}};
}
function resolveB(bet,gr,statMap){
  // Parlay: resolve each stored leg, win only if all win
  if(bet.isParlay && bet.legs && bet.legs.length){
    var allFinal = bet.legs.every(function(leg){
      // Each leg has a gameId; check if that game is finalized
      var legRes = gr[leg.gid||leg.gameId];
      return legRes && legRes.final;
    });
    if(!allFinal) return "pending";
    var allWin = bet.legs.every(function(leg){
      var legId = leg.id;
      var legGameId = leg.gid || leg.gameId;
      var legType = leg.type || leg.gameType || "rr";
      var legRes = gr[legGameId];
      if(!legRes || !legRes.final) return false;
      // Resolve this prop leg
      if(legId.indexOf("_prop_")>=0){
        var after = legId.split("_prop_")[1];
        var dir = after.slice(after.lastIndexOf("_")+1);
        var rest = after.slice(0,after.lastIndexOf("_"));
        var stat = rest.slice(rest.lastIndexOf("_")+1);
        var pname = rest.slice(0,rest.lastIndexOf("_"));
        var pst = (statMap && statMap[legGameId+"__"+pname]) || {pts:0,reb:0,ast:0};
        var line = getPL(pname,legType)[stat] || 0;
        if(dir==="over") return pst[stat]>line;
        if(dir==="under") return pst[stat]<line;
        return false;
      }
      return false;
    });
    return allWin ? "win" : "loss";
  }
  var res = gr[bet.gameId];
  if(!res || !res.final) return "pending";
  var s1=res.s1, s2=res.s2, spread=res.spread, ou=res.ou, sfav=res.sfav;
  var id = bet.betOptionId;
  if(!id) return bet.result;
  if(id.slice(-4)==="_ml1") return s1>s2?"win":"loss";
  if(id.slice(-4)==="_ml2") return s2>s1?"win":"loss";
  if(id.slice(-4)==="_sp1") return sfav===1 ? ((s1-s2)>spread?"win":"loss") : ((s2-s1)<spread?"win":"loss");
  if(id.slice(-4)==="_sp2") return sfav===2 ? ((s2-s1)>spread?"win":"loss") : ((s1-s2)<spread?"win":"loss");
  var tot = s1+s2;
  if(id.slice(-4)==="_ouo") return s1>ou?"win":"loss";
  if(id.slice(-4)==="_ouu") return s2>ou?"win":"loss";
  if(id.indexOf("_prop_")>=0){
    var after2 = id.split("_prop_")[1];
    var dir2 = after2.slice(after2.lastIndexOf("_")+1);
    var rest2 = after2.slice(0,after2.lastIndexOf("_"));
    var stat2 = rest2.slice(rest2.lastIndexOf("_")+1);
    var pname2 = rest2.slice(0,rest2.lastIndexOf("_"));
    var pst2 = (statMap && statMap[bet.gameId+"__"+pname2]) || {pts:0,reb:0,ast:0};
    var line2 = getPL(pname2, bet.gameType||"rr")[stat2] || 0;
    if(dir2==="over") return pst2[stat2]>line2?"win":"loss";
    if(dir2==="under") return pst2[stat2]<line2?"win":"loss";
  }
  return bet.result;
}

// ── App ────────────────────────────────────────────────────────────────────
function App() {
  var MO = "'DM Mono',monospace";
  var DI = "'Oswald',sans-serif";
  var BO = "'Montserrat',sans-serif";
  var CARD = {background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:12};

  var tabS = useState(0); var tab = tabS[0]; var setTab = tabS[1];
  var rrScS = useState(function(){ return store.get("rr")||{}; }); var rrSc = rrScS[0]; var setRrSc = rrScS[1];
  var sf1S = useState(function(){ return store.get("sf1")||{t1:null,t2:null,s1:0,s2:0,w:null}; }); var sf1 = sf1S[0]; var setSf1 = sf1S[1];
  var sf2S = useState(function(){ return store.get("sf2")||{t1:null,t2:null,s1:0,s2:0,w:null}; }); var sf2 = sf2S[0]; var setSf2 = sf2S[1];
  var finS = useState(function(){ return store.get("fin")||{t1:null,t2:null,s1:0,s2:0,w:null}; }); var fin = finS[0]; var setFin = finS[1];
  var betsS = useState(function(){ return store.get("bets")||[]; }); var bets = betsS[0]; var setBets = betsS[1];
  var statS = useState(function(){ return store.get("pst")||{}; }); var pStats = statS[0]; var setPStats = statS[1];
  var skSelS = useState(null); var skSel = skSelS[0]; var setSkSel = skSelS[1];
  var skTabS = useState(0); var skTab = skTabS[0]; var setSkTab = skTabS[1];
  var bGameS = useState(null); var bGame = bGameS[0]; var setBGame = bGameS[1];
  var bViewS = useState("lines"); var bView = bViewS[0]; var setBView = bViewS[1];
  var stSlipS = useState([]); var stSlip = stSlipS[0]; var setStSlip = stSlipS[1];
  var paSlipS = useState([]); var paSlip = paSlipS[0]; var setPaSlip = paSlipS[1];
  var slipOpenS = useState(false); var slipOpen = slipOpenS[0]; var setSlipOpen = slipOpenS[1];
  var bettorS = useState(""); var bettor = bettorS[0]; var setBettor = bettorS[1];
  var amtS = useState(null); var slipAmt = amtS[0]; var setSlipAmt = amtS[1];
  var ledgerS = useState(false); var showLedger = ledgerS[0]; var setShowLedger = ledgerS[1];
  var rulesS = useState(false); var showRules = rulesS[0]; var setShowRules = rulesS[1];
  useEffect(function(){ store.set("rr",rrSc); }, [rrSc]);
  useEffect(function(){ store.set("sf1",sf1); }, [sf1]);
  useEffect(function(){ store.set("sf2",sf2); }, [sf2]);
  useEffect(function(){ store.set("fin",fin); }, [fin]);
  useEffect(function(){ store.set("bets",bets); }, [bets]);
  useEffect(function(){ store.set("pst",pStats); }, [pStats]);

  function skKey(gid,p){ return gid+"__"+p; }
  function getSt(gid,p){ return pStats[skKey(gid,p)] || {pts:0,reb:0,ast:0}; }
  function gameMax(gid){
    // RR games cap at 3, bracket games cap at 7
    if(gid==="sf1"||gid==="sf2"||gid==="fin") return 7;
    return 3;
  }
  function adjSt(gid,teamId,p,f,d){
    if(f==="pts" && d>0){
      var cap = gameMax(gid);
      var curTeamPts = liveTP(gid,teamId);
      if(curTeamPts >= cap){
        if(gid==="sf1"||gid==="sf2"||gid==="fin"){
          // Find the other team's id directly from state
          var matchState = gid==="sf1" ? sf1 : gid==="sf2" ? sf2 : fin;
          var otherTeamId = matchState.t1===teamId ? matchState.t2 : matchState.t1;
          var otherPts = otherTeamId ? liveTP(gid,otherTeamId) : 0;
          // Allow continued scoring if both teams at cap-1 or more and no one leads by 2
          if(otherPts >= cap-1 && curTeamPts-otherPts < 2){
            // overtime — fall through to allow
          } else {
            return; // capped
          }
        } else {
          return; // RR cap
        }
      }
    }
    setPStats(function(prev){
      var k = skKey(gid,p);
      var c = prev[k] || {pts:0,reb:0,ast:0};
      var next = {};
      next[f] = Math.max(0, c[f]+d);
      return Object.assign({}, prev, {[k]: Object.assign({},c,next)});
    });
  }
  function resetGame(gid){
    var teams = skGames.find(function(g){ return g.id===gid; });
    if(!teams) return;
    var allPlayers = teams.teams.reduce(function(a,tid){ return a.concat(getTeam(tid).players); },[]);
    setPStats(function(prev){
      var next = Object.assign({},prev);
      allPlayers.forEach(function(p){
        next[skKey(gid,p)] = {pts:0,reb:0,ast:0};
      });
      return next;
    });
    // Reopen the RR game if finalized
    if(rrSc[gid]&&rrSc[gid].final){
      reopenRR(gid);
    }
    // If this is an RR game, also wipe SF and Final — standings are no longer valid
    var isRR = ALL_GAMES.some(function(g){ return g.id===gid; });
    if(isRR){
      var emptyMatch = {t1:null,t2:null,s1:0,s2:0,w:null};
      setSf1(emptyMatch);
      setSf2(emptyMatch);
      setFin(emptyMatch);
      // Also clear SF/Final player stats
      ["sf1","sf2","fin"].forEach(function(bid){
        setPStats(function(prev){
          var next = Object.assign({},prev);
          ALL_PLAYERS.forEach(function(p){
            next[skKey(bid,p)] = {pts:0,reb:0,ast:0};
          });
          return next;
        });
      });
    }
  }
  function liveTP(gid,tid){
    return getTeam(tid).players.reduce(function(s,p){ return s+(pStats[skKey(gid,p)]&&pStats[skKey(gid,p)].pts||0); }, 0);
  }

  // Single source of truth: resolve ALL bets whenever any score state changes
  useEffect(function(){
    if(!bets.length) return;
    // Build game results from current state
    var gr = {};
    ALL_GAMES.forEach(function(g){
      var sc = rrSc[g.id]; if(!sc) return;
      var o = calcOdds(g.t1,g.t2,"rr");
      gr[g.id] = {s1:sc.t1,s2:sc.t2,spread:o.spread,ou:o.ou,sfav:o.sfav,final:!!sc.final};
    });
    [{gid:"sf1",m:sf1},{gid:"sf2",m:sf2}].forEach(function(x){
      if(!x.m.t1||!x.m.t2) return;
      var o = calcOdds(x.m.t1,x.m.t2,"se");
      gr[x.gid] = {s1:x.m.s1,s2:x.m.s2,spread:o.spread,ou:o.ou,sfav:o.sfav,final:!!x.m.w};
    });
    if(fin.t1&&fin.t2){
      var o2 = calcOdds(fin.t1,fin.t2,"final");
      gr["fin"] = {s1:fin.s1,s2:fin.s2,spread:o2.spread,ou:o2.ou,sfav:o2.sfav,final:!!fin.w};
    }
    var resolved = bets.map(function(b){ return Object.assign({},b,{result:resolveB(b,gr,pStats)}); });
    var changed = resolved.some(function(b,i){ return b.result!==bets[i].result; });
    if(changed) setBets(resolved);
  }, [rrSc,sf1.w,sf2.w,fin.w,pStats]);

  function finalizeRR(gameId){
    setRrSc(function(prev){
      var cur = prev[gameId] || {t1:0,t2:0,final:false};
      var upd = {}; upd[gameId] = Object.assign({},cur,{final:true});
      return Object.assign({},prev,upd);
    });
  }

  function reopenRR(gameId){
    setRrSc(function(prev){
      var cur = prev[gameId] || {t1:0,t2:0,final:false};
      var upd = {}; upd[gameId] = Object.assign({},cur,{final:false});
      return Object.assign({},prev,upd);
    });
  }

  useEffect(function(){
    ALL_GAMES.forEach(function(g){
      var s1=liveTP(g.id,g.t1), s2=liveTP(g.id,g.t2);
      setRrSc(function(prev){
        var cur = prev[g.id]||{t1:0,t2:0,final:false};
        if(cur.t1===s1&&cur.t2===s2) return prev;
        var upd = {}; upd[g.id] = Object.assign({},cur,{t1:s1,t2:s2});
        return Object.assign({},prev,upd);
      });
    });
  }, [pStats]);

  useEffect(function(){
    if(sf1.t1&&sf1.t2){
      var s1=liveTP("sf1",sf1.t1), s2=liveTP("sf1",sf1.t2);
      if(s1!==sf1.s1||s2!==sf1.s2) setSf1(function(m){ return Object.assign({},m,{s1:s1,s2:s2}); });
    }
  }, [pStats,sf1.t1,sf1.t2]);
  useEffect(function(){
    if(sf2.t1&&sf2.t2){
      var s1=liveTP("sf2",sf2.t1), s2=liveTP("sf2",sf2.t2);
      if(s1!==sf2.s1||s2!==sf2.s2) setSf2(function(m){ return Object.assign({},m,{s1:s1,s2:s2}); });
    }
  }, [pStats,sf2.t1,sf2.t2]);
  useEffect(function(){
    if(fin.t1&&fin.t2){
      var s1=liveTP("fin",fin.t1), s2=liveTP("fin",fin.t2);
      if(s1!==fin.s1||s2!==fin.s2) setFin(function(m){ return Object.assign({},m,{s1:s1,s2:s2}); });
    }
  }, [pStats,fin.t1,fin.t2]);

  var standings = TEAMS.map(function(t){
    var w=0,l=0,pf=0,pa=0;
    ALL_GAMES.forEach(function(g){
      var sc=rrSc[g.id]; if(!sc||!sc.final) return;
      if(g.t1===t.id){pf+=sc.t1;pa+=sc.t2;sc.t1>sc.t2?w++:l++;}
      if(g.t2===t.id){pf+=sc.t2;pa+=sc.t1;sc.t2>sc.t1?w++:l++;}
    });
    return Object.assign({},t,{w:w,l:l,pf:pf,pa:pa});
  }).sort(function(a,b){ return b.w-a.w||b.pf-a.pf; });

  var rrDone = ALL_GAMES.every(function(g){ return rrSc[g.id]&&rrSc[g.id].final; });
  var rrDoneN = ALL_GAMES.filter(function(g){ return rrSc[g.id]&&rrSc[g.id].final; }).length;

  useEffect(function(){
    if(rrDone&&!sf1.t1){
      var s = standings;
      setSf1({t1:s[0].id,t2:s[3].id,s1:0,s2:0,w:null});
      setSf2({t1:s[1].id,t2:s[2].id,s1:0,s2:0,w:null});
    }
  }, [rrDone]);

  var skGames = ALL_GAMES.map(function(g){
    return {id:g.id,label:"G"+GNUM[g.id]+": "+getTeam(g.t1).label+" vs "+getTeam(g.t2).label,teams:[g.t1,g.t2],type:"rr"};
  });
  if(sf1.t1) skGames.push({id:"sf1",label:"SF1: "+getTeam(sf1.t1).label+" vs "+getTeam(sf1.t2).label,teams:[sf1.t1,sf1.t2],type:"se"});
  if(sf2.t1) skGames.push({id:"sf2",label:"SF2: "+getTeam(sf2.t1).label+" vs "+getTeam(sf2.t2).label,teams:[sf2.t1,sf2.t2],type:"se"});
  if(fin.t1&&fin.t2) skGames.push({id:"fin",label:"Final: "+getTeam(fin.t1).label+" vs "+getTeam(fin.t2).label,teams:[fin.t1,fin.t2],type:"final"});

  var bGames = ALL_GAMES.map(function(g){
    return {id:g.id,label:"G"+GNUM[g.id],full:"Game "+GNUM[g.id],t1:g.t1,t2:g.t2,type:"rr",max:10};
  });
  if(sf1.t1) bGames.push({id:"sf1",label:"SF1",full:"Semifinal 1",t1:sf1.t1,t2:sf1.t2,type:"se",max:10});
  if(sf2.t1) bGames.push({id:"sf2",label:"SF2",full:"Semifinal 2",t1:sf2.t1,t2:sf2.t2,type:"se",max:10});
  if(fin.t1&&fin.t2) bGames.push({id:"fin",label:"Final",full:"Championship",t1:fin.t1,t2:fin.t2,type:"final",max:10});

  var selG = bGames.find(function(g){ return g.id===bGame; }) || bGames[0];

  // Slip helpers
  function hasSt(id){ return stSlip.some(function(l){ return l.id===id; }); }
  function haPa(id){ return paSlip.some(function(l){ return l.id===id; }); }
  var totalLegs = stSlip.length + paSlip.length;

  function paBlock(leg){
    if(paSlip.length>=3 && !haPa(leg.id)) return "MAX 3 LEGS";
    // All parlay legs must be from the same game
    if(paSlip.length>0 && !haPa(leg.id)){
      var existingGame = paSlip[0].gid;
      if(leg.gid !== existingGame) return "SAME GAME ONLY";
    }
    var idx = leg.id.indexOf("_prop_");
    if(idx>=0){
      var after = leg.id.slice(idx+6);
      var u1 = after.indexOf("_");
      var u2 = after.indexOf("_",u1+1);
      var pname = after.slice(0,u2);
      var dup = paSlip.some(function(l){
        var li = l.id.indexOf("_prop_");
        if(li<0) return false;
        var la = l.id.slice(li+6);
        var lu2 = la.indexOf("_", la.indexOf("_")+1);
        return la.slice(0,lu2)===pname && l.id!==leg.id;
      });
      if(dup && !haPa(leg.id)) return "ONE PROP PER PLAYER";
    }
    return null;
  }

  function toggleSt(leg){
    if(hasSt(leg.id)){
      setStSlip(function(s){ return s.filter(function(l){ return l.id!==leg.id; }); });
    } else {
      setStSlip(function(s){ return s.concat([leg]); });
    }
  }
  function togglePa(leg){
    if(haPa(leg.id)){
      setPaSlip(function(s){ return s.filter(function(l){ return l.id!==leg.id; }); });
      return;
    }
    if(paBlock(leg)) return;
    setPaSlip(function(s){ return s.concat([leg]); });
  }

  function getPlayersInGame(gameId){
    // Returns all players involved in a given game (both teams)
    var rrGame = ALL_GAMES.find(function(g){ return g.id===gameId; });
    if(rrGame) return getTeam(rrGame.t1).players.concat(getTeam(rrGame.t2).players);
    if(gameId==="sf1"&&sf1.t1&&sf1.t2) return getTeam(sf1.t1).players.concat(getTeam(sf1.t2).players);
    if(gameId==="sf2"&&sf2.t1&&sf2.t2) return getTeam(sf2.t1).players.concat(getTeam(sf2.t2).players);
    if(gameId==="fin"&&fin.t1&&fin.t2) return getTeam(fin.t1).players.concat(getTeam(fin.t2).players);
    return [];
  }

  // Compute which players can't bet: union of all players in all games in the current slip
  var blockedBettors = (function(){
    var blocked = {};
    stSlip.forEach(function(leg){ getPlayersInGame(leg.gid).forEach(function(p){ blocked[p]=true; }); });
    paSlip.forEach(function(leg){ getPlayersInGame(leg.gid).forEach(function(p){ blocked[p]=true; }); });
    return blocked;
  })();

  var bettorIsBlocked = bettor && blockedBettors[bettor];

  // Check if bettor already has 2 parlays on this same game (max 2 per person per game)
  var parlayGameId = paSlip.length > 0 ? paSlip[0].gid : null;
  var bettorParlayCount = bettor && parlayGameId ? bets.filter(function(b){
    return b.isParlay && b.bettor===bettor && b.legs && b.legs.length>0 && b.legs[0].gid===parlayGameId;
  }).length : 0;
  var bettorHasParlay = bettorParlayCount >= 2;

  function lockBets(){
    if(!bettor||!slipAmt) return;
    if(paSlip.length && bettorHasParlay) return;
    // Block if parlay legs span multiple games
    if(paSlip.length>0){
      var parlayGid = paSlip[0].gid;
      var crossGame = paSlip.some(function(l){ return l.gid!==parlayGid; });
      if(crossGame) return;
    }
    // Block if any game in the slip has started or finalized
    var allLegs = stSlip.concat(paSlip);
    var gameStarted = allLegs.some(function(leg){
      var gid = leg.gid;
      var fin2 = (rrSc[gid]&&rrSc[gid].final)||(gid==="sf1"&&!!sf1.w)||(gid==="sf2"&&!!sf2.w)||(gid==="fin"&&!!fin.w);
      var hasStats = ALL_PLAYERS.some(function(p){ var s=pStats[skKey(gid,p)]; return s&&(s.pts>0||s.reb>0||s.ast>0); });
      return fin2||hasStats;
    });
    if(gameStarted) return;
    // Build current game results inline
    var gr = {};
    ALL_GAMES.forEach(function(g){
      var sc = rrSc[g.id]; if(!sc) return;
      var o = calcOdds(g.t1,g.t2,"rr");
      gr[g.id] = {s1:sc.t1,s2:sc.t2,spread:o.spread,ou:o.ou,sfav:o.sfav,final:!!sc.final};
    });
    if(sf1.t1&&sf1.t2){ var os1=calcOdds(sf1.t1,sf1.t2,"se"); gr["sf1"]={s1:sf1.s1,s2:sf1.s2,spread:os1.spread,ou:os1.ou,sfav:os1.sfav,final:!!sf1.w}; }
    if(sf2.t1&&sf2.t2){ var os2=calcOdds(sf2.t1,sf2.t2,"se"); gr["sf2"]={s1:sf2.s1,s2:sf2.s2,spread:os2.spread,ou:os2.ou,sfav:os2.sfav,final:!!sf2.w}; }
    if(fin.t1&&fin.t2){ var of=calcOdds(fin.t1,fin.t2,"final"); gr["fin"]={s1:fin.s1,s2:fin.s2,spread:of.spread,ou:of.ou,sfav:of.sfav,final:!!fin.w}; }
    var nb = [];
    stSlip.forEach(function(leg,i){
      var tw = mlPay(leg.ml,slipAmt);
      var b = {id:Date.now()+i,bettor:bettor,game:leg.gLabel||leg.label,gameId:leg.gid,betOptionId:leg.id,pick:leg.label,line:fml(leg.ml),amt:slipAmt,toWin:tw,result:"pending",ts:new Date().toLocaleTimeString(),gameType:leg.type||"rr"};
      b.result = resolveB(b,gr,pStats);
      nb.push(b);
    });
    if(paSlip.length){
      var tw2 = parlayWin(paSlip,slipAmt);
      var pb = {id:Date.now()+100,bettor:bettor,game:"PROP PARLAY",gameId:"parlay",betOptionId:"parlay",isParlay:true,legs:paSlip,pick:paSlip.map(function(l){return l.label;}).join(" + "),line:parlayOdds(paSlip),amt:slipAmt,toWin:tw2,result:"pending",ts:new Date().toLocaleTimeString(),gameType:"parlay"};
      pb.result = resolveB(pb,gr,pStats);
      nb.push(pb);
    }
    setBets(function(p){ return p.concat(nb); });
    setStSlip([]); setPaSlip([]); setSlipAmt(null); setBettor(""); setSlipOpen(false);
  }

  var totW = bets.reduce(function(s,b){ return s+b.amt; }, 0);
  var totP = bets.filter(function(b){ return b.result==="win"; }).reduce(function(s,b){ return s+parseFloat(b.toWin)+b.amt; }, 0);
  var maxA = selG ? selG.max : 5;
  var amts = [1,5,10];

  // ── Sub-components ─────────────────────────────────────────────────────────
  function BetBtn(props) {
    var id=props.id, label=props.label, ml=props.ml, gid=props.gid, gLabel=props.gLabel, type=props.type;
    var sel = hasSt(id);
    function handleClick(){
      toggleSt({id:id,label:label,ml:ml,gid:gid,gLabel:gLabel,type:type});
    }
    return (
      <button
        onClick={handleClick}
        style={{display:"flex",flexDirection:"column",alignItems:"center",padding:"10px 6px",borderRadius:8,cursor:"pointer",gap:2,border:"none",background:sel?"rgba(255,107,53,0.2)":"rgba(255,255,255,0.06)",outline:sel?"2px solid #FF6B35":"2px solid transparent",transition:"all 0.15s",minWidth:0,width:"100%"}}
      >
        <span style={{fontFamily:MO,fontSize:7,color:sel?"#FF6B35":"rgba(255,255,255,0.4)",letterSpacing:1}}>{label}</span>
        <span style={{fontFamily:DI,fontSize:17,color:ml<0?"#4ECDC4":"#FBBF24",lineHeight:1}}>{fml(ml)}</span>
        <span style={{fontFamily:MO,fontSize:6,color:"rgba(255,255,255,0.25)",letterSpacing:1}}>STRAIGHT</span>
      </button>
    );
  }

    var o = calcOdds(game.t1,game.t2,game.type);
    var t1 = getTeam(game.t1);
    var t2 = getTeam(game.t2);
    var gl = game.full;
    var rows = [
      {team:t1, ml:o.ml1, sp:o.sfav===1?"-"+o.spread:"+"+o.spread, spk:"sp1", mlk:"ml1", ouId:game.id+"_ouo", ouLabel:"O "+o.ou},
      {team:t2, ml:o.ml2, sp:o.sfav===2?"-"+o.spread:"+"+o.spread, spk:"sp2", mlk:"ml2", ouId:game.id+"_ouu", ouLabel:"O "+o.ou}

    return (
      <div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:6,marginBottom:10,paddingBottom:8,borderBottom:"1px solid rgba(255,255,255,0.07)"}}>
          <div/>
          <div style={{fontFamily:MO,fontSize:7,color:"rgba(255,255,255,0.3)",textAlign:"center",letterSpacing:1}}>MONEYLINE</div>
          <div style={{fontFamily:MO,fontSize:7,color:"rgba(255,255,255,0.3)",textAlign:"center",letterSpacing:1}}>SPREAD</div>
          <div style={{fontFamily:MO,fontSize:7,color:"rgba(255,255,255,0.3)",textAlign:"center",letterSpacing:1}}>O/U</div>
        </div>
        {rows.map(function(row,ri){
          return (

              </div>
              <BetBtn id={game.id+"_"+row.mlk} label={row.team.label} ml={row.ml} gid={game.id} gLabel={gl+": "+row.team.label+" ML"} type={game.type}/>
              <BetBtn id={game.id+"_"+row.spk} label={row.sp} ml={-110} gid={game.id} gLabel={gl+": "+row.team.label+" "+row.sp} type={game.type}/>
              <BetBtn id={row.ouId} label={row.ouLabel} ml={-110} gid={game.id} gLabel={gl+": "+row.ouLabel} type={game.type}/>
            </div>
          );
        })}
      </div>
    );
  }

  function PropBtn(props) {
    var id=props.id, leg=props.leg, sel=props.sel, blocked=props.blocked, dir=props.dir, ml=props.ml, line=props.line;
    var isBlocked = blocked && !sel;
    var bg = sel ? (dir==="over"?"rgba(168,255,120,0.15)":"rgba(255,107,53,0.15)") : "rgba(255,255,255,0.03)";
    var outlineColor = sel ? (dir==="over"?"#A8FF78":"#FF6B35") : (isBlocked?"rgba(255,80,80,0.2)":"transparent");
    var labelColor = sel ? (dir==="over"?"#A8FF78":"#FF6B35") : (isBlocked?"#FF8080":"rgba(255,255,255,0.3)");

    function handleClick(){ togglePa(leg); }

      <button
        onClick={handleClick}
        disabled={isBlocked}
        style={{padding:"9px 4px",borderRadius:6,cursor:isBlocked?"not-allowed":"pointer",border:"none",background:bg,outline:"1.5px solid "+outlineColor,opacity:isBlocked?0.4:1,display:"flex",flexDirection:"column",alignItems:"center",gap:2,width:"100%"}}

        <span style={{fontFamily:MO,fontSize:6,color:labelColor,letterSpacing:1}}>{labelText}</span>
        <span style={{fontFamily:DI,fontSize:15,color:ml<0?"#4ECDC4":"#FBBF24"}}>{fml(ml)}</span>

      </button>

  }

        {teams.map(function(team){

                <span style={{fontFamily:DI,fontSize:11,letterSpacing:2,color:team.color}}>{team.label}</span>

                        var uleg = {id:uid,label:name+" U"+s.line+" "+s.label,ml:s.uML,gid:game.id,gLabel:gl+": "+name+" U"+s.line+" "+s.label,type:game.type};
                        var ubl = !haPa(uid) ? paBlock(uleg) : null;
                        return <PropBtn key={uid} id={uid} leg={uleg} sel={haPa(uid)} blocked={ubl} dir="under" ml={s.uML} line={s.line}/>;
                      })}
                    </div>
                  </div>
                );
              })}
            </div>
          );
        })}
      </div>
    );
  }

  function SkPanel(props) {
    var game = props.game;
    var allP = game.teams.reduce(function(a,tid){ return a.concat(getTeam(tid).players.map(function(p){ return {name:p,team:getTeam(tid)}; })); },[]);
    var cap = gameMax(game.id);

    function renderFinalizeBar(){
      var t1=getTeam(game.teams[0]), t2=getTeam(game.teams[1]);
      var s1=liveTP(game.id,t1.id), s2=liveTP(game.id,t2.id);
      var isBracket = game.type==="se"||game.type==="final";
      function hasWinner(){
        if(!isBracket) return s1!==s2 && (s1>=cap||s2>=cap);
        if(s1>=cap && s1-s2>=2) return true;
        if(s2>=cap && s2-s1>=2) return true;
        return false;
      }
      var alreadyFinal = (game.type==="rr" && rrSc[game.id]&&rrSc[game.id].final)
        || (game.id==="sf1"&&!!sf1.w)
        || (game.id==="sf2"&&!!sf2.w)
        || (game.id==="fin"&&!!fin.w);
      var winner = hasWinner() ? (s1>s2?t1:t2) : null;
      var canFinalize = !alreadyFinal && !!winner;
      function doFinalize(){
        if(!canFinalize) return;
        var w = s1>s2?t1.id:t2.id;
        if(game.type==="rr"){
          finalizeRR(game.id);
        } else if(game.id==="sf1"){
          setSf1(function(mm){ return Object.assign({},mm,{w:w}); });
          setFin(function(f){ return Object.assign({},f,{t1:w}); });
        } else if(game.id==="sf2"){
          setSf2(function(mm){ return Object.assign({},mm,{w:w}); });
          setFin(function(f){ return Object.assign({},f,{t2:w}); });
        } else if(game.id==="fin"){
          setFin(function(mm){ return Object.assign({},mm,{w:w}); });
        }
      }
      function doReopen(){
        if(game.type==="rr"){
          reopenRR(game.id);
        } else if(game.id==="sf1"){
          setSf1(function(mm){ return Object.assign({},mm,{w:null}); });
          setFin(function(f){ return Object.assign({},f,{t1:null,w:null}); });
        } else if(game.id==="sf2"){
          setSf2(function(mm){ return Object.assign({},mm,{w:null}); });
          setFin(function(f){ return Object.assign({},f,{t2:null,w:null}); });
        } else if(game.id==="fin"){
          setFin(function(mm){ return Object.assign({},mm,{w:null}); });
        }
      }
      var tied = isBracket && s1===s2 && s1>=6;
      var statusMsg = alreadyFinal
        ? "FINAL: "+(s1>s2?t1.label:t2.label)+" wins "+Math.max(s1,s2)+"-"+Math.min(s1,s2)
        : tied ? "TIED AT "+s1+" - KEEP PLAYING"
        : canFinalize ? null
        : isBracket ? "FIRST TO "+cap+" (WIN BY 2)" : "FIRST TO "+cap;
      if(alreadyFinal){
        return (
          <div style={{padding:"10px 14px",borderTop:"1px solid rgba(255,255,255,0.06)",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <div style={{width:6,height:6,borderRadius:"50%",background:"#A8FF78"}}/>
              <span style={{fontFamily:MO,fontSize:9,color:"#A8FF78",letterSpacing:1}}>{statusMsg}</span>
            </div>

    return (

            var inOvertime = isBracketGame && teamPts>=cap-1 && otherPts>=cap-1 && Math.abs(teamPts-otherPts)<2;

                      {showLedger&&(

                            var betGid = b.isParlay && b.legs && b.legs.length>0 ? b.legs[0].gid : b.gameId;
                            var gameHasStats = ALL_PLAYERS.some(function(p){
                              var s = pStats[skKey(betGid,p)];
                              return s && (s.pts>0||s.reb>0||s.ast>0);
                            });
                            var gameIsFinalized = (rrSc[betGid]&&rrSc[betGid].final)||(betGid==="sf1"&&!!sf1.w)||(betGid==="sf2"&&!!sf2.w)||(betGid==="fin"&&!!fin.w);

                <div style={{display:"flex",borderBottom:"1px solid rgba(255,255,255,0.07)"}}>

                  {(function(){

                    return (

                              </div>

                      {paSlip.length>0&&(

                                    <span style={{fontFamily:DI,fontSize:17,color:leg.ml<0?"#4ECDC4":"#FBBF24"}}>{fml(leg.ml)}</span>
                                    <button onClick={function(){ setPaSlip(function(s){ return s.filter(function(_,j){ return j!==i; }); }); }} style={{background:"none",border:"none",color:"rgba(255,255,255,0.2)",cursor:"pointer",fontSize:16,lineHeight:1,padding:2}}>x</button>
                                  </div>
                                </div>
                              );

                          {paSlip.length>1&&(

                              <span style={{fontFamily:MO,fontSize:8,color:"rgba(255,255,255,0.35)",letterSpacing:1}}>COMBINED ODDS</span>
                              <span style={{fontFamily:DI,fontSize:20,color:"#FFB800"}}>{parlayOdds(paSlip)}</span>
                            </div>
                          )}
          <div style={{fontFamily:MO,fontSize:7,color:"rgba(255,255,255,0.2)"}}>Same-game parlay only. Max 4 legs.</div>
                        </div>
                      )}
                      <div style={{marginBottom:12}}>
                        <div style={{fontFamily:MO,fontSize:8,color:"rgba(255,255,255,0.3)",letterSpacing:2,marginBottom:8}}>STAKE - MAX ${maxA}</div>
                        <div style={{display:"flex",gap:6}}>
                          {amts.map(function(a){
                            return <button key={a} onClick={function(){ setSlipAmt(a); }} style={{flex:1,padding:"10px 4px",borderRadius:8,cursor:"pointer",background:slipAmt===a?"rgba(255,107,53,0.25)":"rgba(255,255,255,0.06)",border:slipAmt===a?"1px solid #FF6B35":"1px solid rgba(255,255,255,0.08)",fontFamily:DI,fontSize:15,color:slipAmt===a?"#FF6B35":"rgba(255,255,255,0.5)"}}>${a}</button>;
                          })}
                        </div>
                      </div>
                      {slipAmt&&(
                        <div style={{display:"flex",gap:8,marginBottom:12}}>
                          {stSlip.length>0&&(
                            <div style={{flex:1,padding:"10px 8px",background:"rgba(255,255,255,0.04)",borderRadius:8,textAlign:"center"}}>
                              <div style={{fontFamily:MO,fontSize:7,color:"rgba(255,255,255,0.25)",marginBottom:3}}>STRAIGHT WIN</div>
                              <div style={{fontFamily:DI,fontSize:16,color:"#A8FF78"}}>${stSlip.reduce(function(s,l){ return s+parseFloat(mlPay(l.ml,slipAmt)); }, 0).toFixed(2)}</div>

                            </div>
                          )}
                          {paSlip.length>0&&(
                            <div style={{flex:1,padding:"10px 8px",background:"rgba(255,184,0,0.06)",border:"1px solid rgba(255,184,0,0.15)",borderRadius:8,textAlign:"center"}}>
                              <div style={{fontFamily:MO,fontSize:7,color:"rgba(255,184,0,0.5)",marginBottom:3}}>PARLAY WIN</div>
                              <div style={{fontFamily:DI,fontSize:16,color:"#FFB800"}}>${parlayWin(paSlip,slipAmt)}</div>
                              <div style={{fontFamily:MO,fontSize:7,color:"rgba(255,255,255,0.2)"}}>1 parlay x ${slipAmt}</div>
                            </div>
                          )}
                        </div>
                      )}
                      <div style={{marginBottom:12}}>
                        <div style={{fontFamily:MO,fontSize:8,color:"rgba(255,255,255,0.3)",letterSpacing:2,marginBottom:6}}>WHO'S BETTING?</div>
                        <select value={bettor} onChange={function(e){ setBettor(e.target.value); }} style={{width:"100%",padding:"11px 12px",background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.12)",borderRadius:8,fontFamily:MO,fontSize:12,boxSizing:"border-box",cursor:"pointer"}}>
                          <option value="">Select player...</option>
                          {ALL_PLAYERS.map(function(p){
                            var blocked = !!blockedBettors[p];
                            var pParlayCount = parlayGameId ? bets.filter(function(b){
                              return b.isParlay && b.bettor===p && b.legs && b.legs.length>0 && b.legs[0].gid===parlayGameId;
                            }).length : 0;
                            var maxParlays = pParlayCount >= 2;
                            var label = blocked ? p+" (playing)" : maxParlays ? p+" (2 parlays placed)" : pParlayCount===1 ? p+" (1/2 parlays)" : p;
                            return <option key={p} value={p} disabled={blocked||maxParlays}>{label}</option>;
                          })}
                        </select>
                        {bettorIsBlocked&&(
                          <div style={{marginTop:6,fontFamily:MO,fontSize:8,color:"#FF8080",letterSpacing:1}}>
                            {bettor} is playing in one of these games and can't bet on it.
                          </div>
                        )}
                        {!bettorIsBlocked&&bettorHasParlay&&(
                          <div style={{marginTop:6,fontFamily:MO,fontSize:8,color:"#FF8080",letterSpacing:1}}>
                            {bettor} has already placed 2 parlays on this game.
                          </div>
                        )}
                      </div>
                      <button
                        onClick={lockBets}
                        disabled={!slipAmt||!bettor||!!bettorIsBlocked||(paSlip.length>0&&!!bettorHasParlay)}
                        style={{width:"100%",padding:"14px",borderRadius:10,cursor:slipAmt&&bettor&&!bettorIsBlocked&&!(paSlip.length>0&&bettorHasParlay)?"pointer":"default",background:slipAmt&&bettor&&!bettorIsBlocked&&!(paSlip.length>0&&bettorHasParlay)?"#FF6B35":"rgba(255,255,255,0.06)",border:"none",fontFamily:DI,fontSize:15,letterSpacing:2,color:slipAmt&&bettor&&!bettorIsBlocked&&!(paSlip.length>0&&bettorHasParlay)?"#fff":"rgba(255,255,255,0.2)"}}
                      >
                        PLACE {stSlip.length>0&&paSlip.length>0?"BETS + PARLAY":stSlip.length>0?"BET"+(stSlip.length>1?"S":""):"PARLAY"}
                      </button>
                    </div>
                  </div>
                )}
              </div>
            )}

          </div>
        )}

        {tab===1&&(
          <div>
            <div style={{padding:"12px 12px 0",display:"flex",alignItems:"center",gap:6}}>
              <div style={{overflowX:"auto",display:"flex",gap:6,flex:1,scrollbarWidth:"none",WebkitOverflowScrolling:"touch"}}>
              {skGames.map(function(g){
                var active = g.id===skSel;
                var shortLabel = g.type==="rr" ? "G"+GNUM[g.id] : g.type==="se" ? (g.id==="sf1"?"SF1":"SF2") : "Final";
                return (
                  <button key={g.id} onClick={function(){ setSkSel(skSel===g.id?null:g.id); }} style={{flexShrink:0,padding:"7px 14px",borderRadius:20,cursor:"pointer",fontFamily:DI,fontSize:12,letterSpacing:1,border:"none",background:active?"#FF6B35":"rgba(255,255,255,0.08)",color:active?"#fff":"rgba(255,255,255,0.5)"}}>
                    {shortLabel}
                  </button>
                );
              })}
              </div>
              {skSel&&(
                <button onClick={function(){ resetGame(skSel); }} style={{flexShrink:0,padding:"7px 12px",borderRadius:20,cursor:"pointer",fontFamily:DI,fontSize:11,letterSpacing:1,border:"1px solid rgba(255,80,80,0.3)",background:"rgba(255,80,80,0.1)",color:"rgba(255,120,120,0.8)"}}>
                  RESET
                </button>
              )}
            </div>
            <div style={{padding:"14px 12px"}}>
              {!skSel&&(
                <div style={{fontFamily:MO,fontSize:8,color:"rgba(255,255,255,0.25)",letterSpacing:2,textAlign:"center",marginTop:20}}>SELECT A GAME ABOVE TO TRACK STATS</div>
              )}
              {skSel&&(function(){
                var game = skGames.find(function(g){ return g.id===skSel; });
                if(!game) return null;
                var isLocked = (game.type==="se"&&!rrDone)||(game.type==="final"&&(!fin.t1||!fin.t2));
                if(isLocked){
                  return (
                    <div style={{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:12,padding:"28px 16px",textAlign:"center"}}>
                      <div style={{fontSize:28,marginBottom:10}}>&#x1F512;</div>
                      <div style={{fontFamily:DI,fontSize:14,letterSpacing:2,color:"rgba(255,255,255,0.35)"}}>
                        {game.type==="se"?"UNLOCKS AFTER ROUND ROBIN":"UNLOCKS AFTER SEMIFINALS"}
                      </div>
                    </div>
                  );
                }
                return <SkPanel game={game}/>;
              })()}
            </div>
          </div>
        )}

        {tab===2&&(
          <div style={{padding:"14px 12px"}}>
            <div style={{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:12,marginBottom:14,overflow:"hidden"}}>
              <div style={{padding:"8px 14px",borderBottom:"1px solid rgba(255,255,255,0.06)",display:"flex",justifyContent:"space-between"}}>
                <span style={{fontFamily:DI,fontSize:13,letterSpacing:2,color:"#FF6B35"}}>STANDINGS</span>
                <span style={{fontFamily:MO,fontSize:8,color:"rgba(255,255,255,0.3)",alignSelf:"center"}}>{rrDoneN}/{ALL_GAMES.length} GAMES FINAL</span>
              </div>
              {standings.map(function(t,i){
                return (
                  <div key={t.id} style={{padding:"9px 14px",borderBottom:i<4?"1px solid rgba(255,255,255,0.04)":"none",display:"flex",alignItems:"center",gap:10,background:i<4?t.color+"07":"transparent"}}>
                    <div style={{fontFamily:DI,fontSize:18,color:i<4?t.color:"rgba(255,255,255,0.2)",minWidth:22,textAlign:"center"}}>{i+1}</div>
                    <div style={{flex:1}}>
                      <div style={{fontFamily:DI,fontSize:14,letterSpacing:1,color:i<4?"#fff":"rgba(255,255,255,0.35)"}}>{t.label}</div>
                      <div style={{fontFamily:MO,fontSize:9,color:"rgba(255,255,255,0.28)"}}>{t.players.join(", ")}</div>
                    </div>
                    <div style={{textAlign:"right"}}>
                      <div style={{fontFamily:DI,fontSize:14,color:i<4?t.color:"rgba(255,255,255,0.28)"}}>{t.w}-{t.l}</div>
                      <div style={{fontFamily:MO,fontSize:9,color:"rgba(255,255,255,0.28)"}}>{t.pf} pts</div>
                    </div>
                    {i===3&&<div style={{fontFamily:MO,fontSize:7,color:"#FFB800",background:"rgba(255,184,0,0.1)",border:"1px solid rgba(255,184,0,0.2)",borderRadius:3,padding:"1px 5px",flexShrink:0}}>CUT</div>}
                  </div>
                );
              })}
              <div style={{padding:"6px 14px",borderTop:"1px solid rgba(255,255,255,0.04)"}}>
                <span style={{fontFamily:MO,fontSize:8,color:"rgba(255,255,255,0.18)"}}>1 court - 6 sequential games - ~54 min</span>
              </div>
            </div>
            {SCHEDULE.map(function(round){
              return (
                <div key={round.round} style={{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:12,marginBottom:12,overflow:"hidden"}}>
                  <div style={{padding:"8px 14px",borderBottom:"1px solid rgba(255,255,255,0.06)",display:"flex",justifyContent:"space-between",background:"rgba(255,184,0,0.04)"}}>
                    <span style={{fontFamily:DI,fontSize:13,letterSpacing:2,color:"#FFB800"}}>ROUND {round.round}</span>
                    <span style={{fontFamily:MO,fontSize:8,color:"rgba(255,255,255,0.3)",alignSelf:"center"}}>BYE: {getTeam(round.bye).label}</span>
                  </div>
                  {round.games.map(function(game,gi){
                    var t1=getTeam(game.t1), t2=getTeam(game.t2);
                    var sc=rrSc[game.id], done=sc&&sc.final;
                    var s1=sc?sc.t1:0, s2=sc?sc.t2:0;
                    return (
                      <div key={game.id} style={{padding:"12px 14px",borderBottom:gi===0?"1px solid rgba(255,255,255,0.04)":"none",display:"flex",alignItems:"center",gap:10}}>
                        <div style={{fontFamily:MO,fontSize:9,color:"rgba(255,255,255,0.22)",minWidth:20,flexShrink:0}}>G{GNUM[game.id]}</div>
                        <div style={{flex:1}}>
                          <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:4}}>
                            <div style={{width:6,height:6,borderRadius:"50%",background:t1.color,flexShrink:0}}/>
                            <span style={{fontFamily:DI,fontSize:13,letterSpacing:1,color:done&&s1>s2?t1.color:"#fff"}}>{t1.label}</span>
                            {done&&s1>s2&&<span style={{fontFamily:MO,fontSize:7,color:t1.color,letterSpacing:1}}>W</span>}
                          </div>
                          <div style={{display:"flex",alignItems:"center",gap:6}}>
                            <div style={{width:6,height:6,borderRadius:"50%",background:t2.color,flexShrink:0}}/>
                            <span style={{fontFamily:DI,fontSize:13,letterSpacing:1,color:done&&s2>s1?t2.color:"#fff"}}>{t2.label}</span>
                            {done&&s2>s1&&<span style={{fontFamily:MO,fontSize:7,color:t2.color,letterSpacing:1}}>W</span>}
                          </div>
                        </div>
                        <div style={{flexShrink:0,textAlign:"right"}}>
                          {done ? (
                            <div style={{fontFamily:DI,fontSize:28,lineHeight:1}}>
                              <span style={{color:s1>s2?t1.color:"rgba(255,255,255,0.4)"}}>{s1}</span>
                              <span style={{color:"rgba(255,255,255,0.18)",fontSize:14,margin:"0 5px"}}>-</span>
                              <span style={{color:s2>s1?t2.color:"rgba(255,255,255,0.4)"}}>{s2}</span>
                            </div>
                          ) : (
                            <span style={{fontFamily:MO,fontSize:8,color:"rgba(255,255,255,0.2)",letterSpacing:1}}>PENDING</span>
                          )}
                        </div>
                      </div>
                    );
                  })}
                </div>
              );
            })}
          </div>
        )}

        {tab===3&&(
          <div style={{padding:"14px 12px"}}>
            {!rrDone&&(
              <div style={{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:12,padding:"20px 16px",textAlign:"center",marginBottom:12}}>
                <div style={{fontFamily:MO,fontSize:10,color:"rgba(255,255,255,0.3)",letterSpacing:2}}>COMPLETE ROUND ROBIN TO SEED BRACKET</div>
                <div style={{fontFamily:DI,fontSize:12,color:"rgba(255,255,255,0.2)",marginTop:6}}>{rrDoneN} / {ALL_GAMES.length} games complete</div>
              </div>
            )}
            {[
              {label:"SEMIFINAL 1",sublabel:"#1 vs #4",match:sf1,ac:"#A78BFA",isFinal:false},
              {label:"SEMIFINAL 2",sublabel:"#2 vs #3",match:sf2,ac:"#A78BFA",isFinal:false},
              {label:"CHAMPIONSHIP",sublabel:"Winner takes all",match:fin,ac:"#FFB800",isFinal:true},
            ].map(function(row,ri){
              var t1 = row.match.t1 ? getTeam(row.match.t1) : null;
              var t2 = row.match.t2 ? getTeam(row.match.t2) : null;
              var done = !!row.match.w;
              var s1 = row.match.s1||0, s2 = row.match.s2||0;
              return (
                <div key={ri} style={{background:"rgba(255,255,255,0.04)",border:"1px solid "+(row.isFinal?"rgba(255,184,0,0.2)":"rgba(255,255,255,0.08)"),borderRadius:12,marginBottom:12,overflow:"hidden"}}>
                  <div style={{padding:"8px 14px",borderBottom:"1px solid rgba(255,255,255,0.06)",display:"flex",justifyContent:"space-between",alignItems:"center",background:row.isFinal?"rgba(255,184,0,0.04)":"transparent"}}>
                    <span style={{fontFamily:DI,fontSize:13,letterSpacing:2,color:row.ac}}>{row.label}</span>
                    <span style={{fontFamily:MO,fontSize:8,color:"rgba(255,255,255,0.3)"}}>{row.isFinal?"TO 7 - WIN BY 2":row.sublabel}</span>
                  </div>
                  {!t1||!t2 ? (
                    <div style={{padding:"16px 14px",fontFamily:MO,fontSize:9,color:"rgba(255,255,255,0.2)",letterSpacing:1}}>
                      {rrDone ? "AWAITING SEMIFINAL RESULTS" : "PENDING ROUND ROBIN"}
                    </div>
                  ) : (
                    <div style={{padding:"12px 14px",display:"flex",alignItems:"center",gap:10}}>
                      <div style={{flex:1}}>
                        <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:4}}>
                          <div style={{width:6,height:6,borderRadius:"50%",background:t1.color,flexShrink:0}}/>
                          <span style={{fontFamily:DI,fontSize:13,letterSpacing:1,color:done&&row.match.w===t1.id?t1.color:"#fff"}}>{t1.label}</span>
                          {done&&row.match.w===t1.id&&<span style={{fontFamily:MO,fontSize:7,color:t1.color,letterSpacing:1}}>{row.isFinal?"CHAMP":"W"}</span>}
                        </div>
                        <div style={{display:"flex",alignItems:"center",gap:6}}>
                          <div style={{width:6,height:6,borderRadius:"50%",background:t2.color,flexShrink:0}}/>
                          <span style={{fontFamily:DI,fontSize:13,letterSpacing:1,color:done&&row.match.w===t2.id?t2.color:"#fff"}}>{t2.label}</span>
                          {done&&row.match.w===t2.id&&<span style={{fontFamily:MO,fontSize:7,color:t2.color,letterSpacing:1}}>{row.isFinal?"CHAMP":"W"}</span>}
                        </div>
                      </div>
                      <div style={{flexShrink:0,textAlign:"right"}}>
                        {done ? (
                          <div style={{fontFamily:DI,fontSize:28,lineHeight:1}}>
                            <span style={{color:row.match.w===t1.id?t1.color:"rgba(255,255,255,0.4)"}}>{s1}</span>
                            <span style={{color:"rgba(255,255,255,0.18)",fontSize:14,margin:"0 5px"}}>-</span>
                            <span style={{color:row.match.w===t2.id?t2.color:"rgba(255,255,255,0.4)"}}>{s2}</span>
                          </div>
                        ) : (
                          <span style={{fontFamily:MO,fontSize:8,color:"rgba(255,255,255,0.2)",letterSpacing:1}}>PENDING</span>
                        )}
                      </div>
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        )}

      </div>
    </div>
  );
}

  ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
} catch(e) {
  document.getElementById('root').innerHTML = '<div style="padding:20px;font-family:monospace;color:#FF8080;font-size:11px"><b style="color:#FF6B35">ERROR:</b><br>' + e.message + '<br><br>' + (e.stack||'').slice(0,500) + '</div>';
}
</script>

</body>
</html>
